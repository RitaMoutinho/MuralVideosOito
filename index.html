<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mural de Vídeos — Minas Radiadores</title>
  <meta name="description" content="Mural de vídeos por categorias. Responsivo, rápido e fácil de editar." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b0b10;
      --card:#12121a;
      --muted:#9aa3b2;
      --text:#e6e8ec;
      --accent:#7c5cff;
      --accent-2:#19d6b3;
      --ring:rgba(124,92,255,.35);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius-xl:18px;
      --radius-lg:14px;
      --radius-md:12px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 90% -10%,rgba(124,92,255,.15),transparent 70%),
        radial-gradient(900px 500px at -10% 20%,rgba(25,214,179,.12),transparent 70%),
        var(--bg);
    }
    a{color:inherit;text-decoration:none}
    .container{width:min(1200px,92vw);margin-inline:auto}
    header.hero{
      position:relative;overflow:hidden;margin:24px 0 14px;
      border-radius:var(--radius-xl);
      background:linear-gradient(135deg,rgba(124,92,255,.18),rgba(25,214,179,.18));
      border:1px solid rgba(255,255,255,.06);
      box-shadow:var(--shadow);
    }
    .hero-inner{display:flex;align-items:center;gap:28px;padding:32px 28px 28px}
    .hero-title{font-size:clamp(20px,4vw,32px);font-weight:700;letter-spacing:.2px}
    .hero-sub{color:var(--muted);max-width:72ch;margin-top:6px}
    .badge{
      display:inline-flex;gap:8px;align-items:center;
      background:rgba(255,255,255,.06);padding:8px 12px;border-radius:999px;
      font-size:12px;color:#cfd6e6;border:1px solid rgba(255,255,255,.08)
    }

    .controls{position:sticky;top:0;z-index:50;background:transparent}
    .controls-inner{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px 4px}
    .tabs{display:flex;flex-wrap:wrap;gap:10px}
    .tab{
      border:1px solid rgba(255,255,255,.08);background:var(--card);
      padding:10px 14px;border-radius:12px;cursor:pointer;
      font-weight:600;color:#dfe4ef;opacity:.9;transition:transform .15s ease,opacity .15s ease, box-shadow .2s ease;
    }
    .tab:hover{opacity:1;transform:translateY(-1px)}
    .tab.active{outline:2px solid var(--ring);box-shadow:0 0 0 6px rgba(124,92,255,.08)}

    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
    section.category{margin:22px 0 32px}
    .category-head{display:flex;align-items:center;justify-content:space-between;margin:10px 6px 8px}
    .category h2{font-size:clamp(18px,3vw,24px);margin:0}
    .category-desc{
      margin:0 6px 12px;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
      max-width:80ch;
      white-space:pre-wrap;
    }

    .video-grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
    .card{
      position:relative;overflow:hidden;border-radius:var(--radius-lg);
      background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.06);box-shadow:var(--shadow);
      transition:transform .18s ease, box-shadow .2s ease,border-color .2s ease;
    }
    .card:hover{transform:translateY(-3px);box-shadow:0 14px 46px rgba(0,0,0,.45);border-color:rgba(255,255,255,.12)}
    .thumb{aspect-ratio:16/9;display:block;width:100%;object-fit:cover;background:#0f1220}
    .meta{padding:10px 12px 12px}
    .title{font-size:14px;font-weight:600;line-height:1.35;margin:0 0 6px;color:#e9ecf7}

    .dur{position:absolute;right:10px;bottom:52px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.16);font-size:12px;padding:4px 8px;border-radius:999px;color:#eaf0ff}
    .play{
      position:absolute;inset:0;display:grid;place-items:center;opacity:0;transition:opacity .2s ease;
      background:linear-gradient(180deg,rgba(0,0,0,0) 20%,rgba(0,0,0,.35));
    }
    .card:hover .play{opacity:1}
    .play button{cursor:pointer;border:none;padding:12px 16px;border-radius:999px;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));color:white;box-shadow:0 8px 26px rgba(124,92,255,.4)}

    /* =====================
       MODAL — responsivo mobile
       ===================== */
    .modal{
      position:fixed;inset:0;display:none;place-items:center;
      background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
      z-index:100;
      padding:16px;          /* espaço nas bordas no mobile */
      overflow-y:auto;
    }
    .modal.open{display:grid}

    .modal-card{
      width:min(960px,100%);
      background:#0f1118;
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      position:relative;
    }

    /* Header do modal */
    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:10px 14px;
      border-bottom:1px solid rgba(255,255,255,.06);
      gap:8px;
    }
    .modal-title{
      font-weight:700;
      font-size:clamp(13px,2.5vw,16px);
      flex:1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    /* Botão fechar — sempre visível e grande no mobile */
    .close{
      all:unset;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      width:38px;
      height:38px;
      min-width:38px;
      border-radius:10px;
      font-size:18px;
      color:#e6e8ec;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      transition:background .15s ease;
      flex-shrink:0;
    }
    .close:hover{background:rgba(255,255,255,.16)}
    .close:active{background:rgba(255,255,255,.22)}

    .modal-body{aspect-ratio:16/9;background:#000}
    .modal-body iframe,.modal-body video{width:100%;height:100%;display:block}

    /* TikTok — vertical */
    .modal-body.tiktok{
      aspect-ratio:auto;
      background:transparent;
      padding:12px;
      display:flex;
      justify-content:center;
    }
    .modal-body.tiktok blockquote.tiktok-embed{margin:auto}

    /* Mobile: limita altura do vídeo para não ultrapassar a tela */
    @media (max-width: 600px){
      .modal{padding:10px}
      .modal-card{border-radius:12px}
      .modal-body{
        aspect-ratio:16/9;
        max-height:56vw; /* ~56% da largura = proporcional 16/9 */
      }
      .modal-body.tiktok{
        aspect-ratio:auto;
        max-height:none;
        padding:8px;
      }
    }

    footer{opacity:.8;color:var(--muted);text-align:center;padding:28px 8px}
    .hide{display:none !important}

    /* Light mode */
    body.light{--bg:#f6f7fb; --card:#fff; --text:#11131a; --muted:#5a6475;}
    body.light .hero-sub{color:#4c5463}
    body.light .tab{color:#20242e}
    body.light .card{border-color:#eef0f6;background:#fff}
    body.light .dur{background:rgba(255,255,255,.9);color:#0a0b10;border-color:#e7e9ef}
    body.light .close{color:#11131a;background:rgba(0,0,0,.07);border-color:rgba(0,0,0,.12)}
    body.light .close:hover{background:rgba(0,0,0,.14)}
  </style>
</head>
<body>
  <div class="container">
    <header class="hero">
      <div class="hero-inner">
        <div>
          <div class="badge">🎬 Mural de Vídeos</div>
          <h1 class="hero-title">Mural Minas Radiadores</h1>
          <p class="hero-sub">Vídeos direcionados à produção de conteúdo, separados por categorias</p>
        </div>
      </div>
    </header>

    <div class="controls">
      <div class="controls-inner container">
        <div class="tabs" id="tabs"></div>
        <button id="mode" title="Alternar tema" style="all:unset;cursor:pointer;padding:8px 10px;border-radius:10px">🌓</button>
      </div>
    </div>

    <main id="content"></main>
  </div>

  <!-- Modal Player -->
  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">Reproduzindo…</div>
        <button class="close" id="modalClose" aria-label="Fechar vídeo">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const videoData = [
      {
        category: 'Informativo',
        description: 'Vídeos explicando a importância do uso correto e os cuidados essenciais com o radiador',
        items: [
          { title:'Video 1', type:'tiktok', src:'https://www.tiktok.com/@jetlub_udi/video/7598636593741647112?_r=1&_t=ZS-95oYk9IxDDG' },
          { title:'Video 2', type:'tiktok', src:'https://www.tiktok.com/@grupofuscaopreto/video/7082851819793206534?_r=1&_t=ZS-95oYRaXgFia' },
          { title:'Vídeo 3', type:'tiktok', src:'https://www.tiktok.com/@radiadores_capital/video/7627089358000229653?_r=1&_t=ZS-95oYbTucR6t' }
          
        ]
      },
      {
        category: 'Narrando',
        description: `Vídeos explicando os modelos disponíveis e o funcionamento da oficina, mostrando o serviço na prática e todo o cuidado em cada etapa do trabalho.
`,
        items: [
          { title: 'Vídeo 1', type: 'tiktok', src: 'https://www.tiktok.com/@grupofuscaopreto/video/7466448403052907782?_r=1&_t=ZS-95oYXbQN1Z1' },
          { title: 'Vídeo 2', type: 'tiktok', src: 'https://www.tiktok.com/@zaguinho_radiadores/video/7556355420659535160?_r=1&_t=ZS-95oYb7s7xAd' },
          { title: 'Vídeo 3', type: 'tiktok', src: 'https://www.tiktok.com/@vitorcfernandes/video/7354206171030441221?q=oficina%20de%20radiadores&t=1777066882129' },

        ]
      },
      {

    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];

    function youtubeId(url){
      try{
        const u = new URL(url);
        if(u.hostname.includes('youtu.be')) return u.pathname.slice(1);
        const v = u.searchParams.get('v'); if(v) return v;
        const m = url.match(/embed\/([\w-]+)/); if(m) return m[1];
      }catch{} return null;
    }

    function tiktokId(url){
      try{
        const clean = url.split('?')[0];
        const m = clean.match(/\/video\/(\d+)/);
        if(m) return m[1];
      }catch{} return null;
    }

    function makeThumb(item){
      if(item.thumb) return item.thumb;
      if(item.type === 'youtube'){
        const id = youtubeId(item.src);
        if(id) return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      }
      return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
           <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
             <stop offset="0%" stop-color="#7c5cff"/><stop offset="100%" stop-color="#19d6b3"/>
           </linearGradient></defs>
           <rect width="1200" height="675" fill="url(#g)"/>
           <circle cx="600" cy="338" r="80" fill="rgba(0,0,0,.35)"/>
           <polygon points="570,300 650,338 570,376" fill="white"/>
         </svg>`
      );
    }

    function buildTabs(){
      const tabs = $('#tabs');
      const all = ['Tudo', ...videoData.map(c=>c.category)];
      all.forEach((name,i)=>{
        const b = document.createElement('button');
        b.className = 'tab' + (i===0 ? ' active' : '');
        b.textContent = name;
        b.dataset.filter = name;
        b.addEventListener('click', ()=>{
          $$('.tab',tabs).forEach(t=>t.classList.remove('active'));
          b.classList.add('active');
          filterByTab(name);
        });
        tabs.appendChild(b);
      });
    }

    function cardTemplate(item){
      const card = document.createElement('article');
      card.className = 'card';
      card.dataset.title = (item.title||'').toLowerCase();
      card.innerHTML = `
        <img class="thumb" alt="${item.title}" src="${makeThumb(item)}" loading="lazy"/>
        <div class="play"><button>▶︎ Assistir</button></div>
        <div class="dur">${item.duration||''}</div>
        <div class="meta"><h3 class="title">${item.title}</h3></div>`;
      card.addEventListener('click',()=>openModal(item));
      return card;
    }

    function sectionTemplate(category){
      const sec = document.createElement('section');
      sec.className = 'category';
      sec.dataset.category = category.category;
      sec.innerHTML = `
        <div class="category-head"><h2>${category.category}</h2></div>
        ${category.description ? `<p class="category-desc">${category.description}</p>` : ''}
        <div class="video-grid"></div>`;
      const grid = $('.video-grid', sec);
      category.items.forEach(item=> grid.appendChild(cardTemplate(item)) );
      return sec;
    }

    function buildContent(){
      const main = $('#content');
      main.innerHTML='';
      videoData.forEach(cat=> main.appendChild(sectionTemplate(cat)) );
    }

    function filterByTab(tab){
      const sections = $$('.category');
      if(tab === 'Tudo'){ sections.forEach(s=>s.classList.remove('hide')); return; }
      sections.forEach(s=>{ s.classList.toggle('hide', s.dataset.category !== tab); });
    }

    const modal = $('#modal');
    const modalBody = $('#modalBody');
    const modalTitle = $('#modalTitle');

    function openModal(item){
      modalTitle.textContent = item.title || 'Reproduzindo';
      modal.classList.add('open');
      document.body.style.overflow = 'hidden'; // evita scroll do fundo
      modalBody.classList.remove('tiktok');
      modalBody.innerHTML = '';

      if(item.type === 'youtube'){
        const id = youtubeId(item.src);
        const iframe = document.createElement('iframe');
        iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
        iframe.title = item.title;
        iframe.frameBorder = '0';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        modalBody.appendChild(iframe);

      } else if(item.type === 'vimeo'){
        const iframe = document.createElement('iframe');
        iframe.src = item.src.includes('player.vimeo.com') ? `${item.src}?autoplay=1` : item.src.replace('vimeo.com','player.vimeo.com/video') + '?autoplay=1';
        iframe.title = item.title;
        iframe.frameBorder = '0';
        iframe.allow = 'autoplay; fullscreen; picture-in-picture';
        iframe.allowFullscreen = true;
        modalBody.appendChild(iframe);

      } else if(item.type === 'tiktok'){
        const id = tiktokId(item.src);
        const canonical = id ? item.src.split('?')[0] : item.src;

        const wrap = document.createElement('blockquote');
        wrap.className = 'tiktok-embed';
        wrap.setAttribute('cite', canonical);
        if(id) wrap.setAttribute('data-video-id', id);
        wrap.style = 'max-width: 605px; min-width: 325px; margin:auto;';
        wrap.innerHTML = '<section></section>';

        modalBody.classList.add('tiktok');
        modalBody.appendChild(wrap);

        const s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.tiktok.com/embed.js';
        s.setAttribute('data-tiktok-embed','1');
        document.body.appendChild(s);

      } else {
        const video = document.createElement('video');
        video.controls = true;
        video.autoplay = true;
        video.src = item.src;
        modalBody.appendChild(video);
      }
    }

    function closeModal(){
      modal.classList.remove('open');
      modalBody.classList.remove('tiktok');
      modalBody.innerHTML = '';
      document.body.style.overflow = ''; // restaura scroll
    }

    modal.addEventListener('click', (e)=>{ if(e.target === modal) closeModal(); });
    $('#modalClose').addEventListener('click', closeModal);

    buildTabs();
    buildContent();

    const modeBtn = $('#mode');
    const saved = localStorage.getItem('mural:mode');
    if(saved === 'light') document.body.classList.add('light');
    modeBtn.addEventListener('click', ()=>{
      document.body.classList.toggle('light');
      localStorage.setItem('mural:mode', document.body.classList.contains('light') ? 'light' : 'dark');
    });

    window.addEventListener('keydown', (e)=>{ if(e.key==='Escape' && modal.classList.contains('open')) closeModal(); });
  </script>
</body>
</html>
